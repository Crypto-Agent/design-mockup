name: Deploy mockups to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sanity-check mockups
        run: |
          set -e
          fail=0
          for f in app.html index.html brief.html; do
            if [ ! -f "$f" ]; then echo "::error::missing $f"; fail=1; continue; fi
            head -1 "$f" | grep -qi "<!DOCTYPE html>" || { echo "::error::$f missing <!DOCTYPE html>"; fail=1; }
            grep -qi "</html>" "$f" || { echo "::error::$f missing closing </html>"; fail=1; }
          done
          [ "$fail" -eq 0 ] && echo "✓ app.html / index.html / brief.html present and well-formed"
          exit $fail

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
